name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - 'src/**'
      - 'fixtures/**'
      - 'build.gradle*'
      - 'settings.gradle*'
      - 'gradle/**'
      - 'tools/**'
      - '.github/workflows/**'
  pull_request:
    paths:
      - 'src/**'
      - 'fixtures/**'
      - 'build.gradle*'
      - 'settings.gradle*'
      - 'gradle/**'
      - 'tools/**'
      - '.github/workflows/**'

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (${{ matrix.profile }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        profile: [26x, legacy]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.4.1"

      - name: Run test suite
        run: gradle test --no-daemon -PautoGenerateStubs -PparserProfile=${{ matrix.profile }}

      - name: Generate JSON output
        run: >
          gradle run --no-daemon -PparserProfile=${{ matrix.profile }}
          --args="--input fixtures/addons/jars/${{ matrix.profile }} --output output/poc-scan --summary output/poc-scan/summary.json --profile ${{ matrix.profile }}"

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ matrix.profile }}
          if-no-files-found: warn
          path: |
            build/reports/tests/test/**
            build/test-results/test/**
